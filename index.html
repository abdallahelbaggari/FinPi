<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FinPi</title>
  <meta name="description" content="FinPi — secure digital payments powered by Pi Network" />
  <link rel="icon" href="/logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="card">
    <img src="/logo.png" class="logo" alt="FinPi Logo" />

    <h1>FinPi</h1>

    <button id="loginBtn" class="btn login">🔐 Continue with Pi</button>

    <div id="status" class="status">
      Open FinPi in Pi Browser to continue.
    </div>

    <footer>© 2026 FinPi Technologies</footer>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="script.js"></script>
</body>
</html>
