<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FinPi</title>
  <meta name="description" content="FinPi — secure digital payments powered by Pi Network" />
  <link rel="icon" href="/logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="card">
    <img src="/logo.png" class="logo" alt="FinPi Logo" />

    <h1>FinPi</h1>
    <p class="lead">Secure digital payments built on Pi Network</p>

    <!-- LOGIN BUTTON -->
    <button id="loginBtn" class="btn login">🔐 Continue with Pi</button>

    <!-- DASHBOARD (Hidden until login) -->
    <div id="dashboard" class="dashboard" style="display:none;">

      <h2>Welcome to FinPi</h2>

      <p id="usernameDisplay" class="username"></p>

      <div class="dash-card">
        <p>Account Status</p>
        <strong>Active</strong>
      </div>

      <div class="dash-card">
        <p>Service</p>
        <strong>Pi Payments Enabled</strong>
      </div>

      <!-- BALANCE CARD -->
      <div class="dash-card">
        <p>FinPi Balance</p>
        <strong id="balance">0 π</strong>
      </div>

      <!-- TRANSACTION HISTORY -->
      <div id="transactions" class="transactions" style="display:none;">
        <h3>Transaction History</h3>
        <ul id="txList">
          <li>No transactions yet</li>
        </ul>
      </div>

    </div>

    <!-- PAYMENT BUTTON -->
    <button id="payBtn" class="btn pay">💸 Pay 1 π</button>

    <!-- STATUS -->
    <div id="status" class="status">
      Open FinPi in Pi Browser to continue.
    </div>

    <footer>© 2026 FinPi Technologies</footer>
  </div>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="script.js"></script>
</body>
</html>
